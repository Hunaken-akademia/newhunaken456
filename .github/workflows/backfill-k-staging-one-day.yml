name: backfill-k-staging-one-day

on:
  workflow_dispatch:
    inputs:
      date:
        description: "取り込む日付 YYYY-MM-DD"
        required: true
        default: "2026-07-02"
      dry:
        description: "true=DB保存なし / false=stagingへ保存"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  backfill-k-staging-one-day:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install lha
        run: sudo apt-get update && sudo apt-get install -y lhasa

      - name: install deps
        working-directory: pipeline
        run: npm install iconv-lite --no-save

      - name: run one-day K backfill to staging
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CAPTURE_TARGET: staging
        run: node backfill_k_staging_one_day.mjs "${{ github.event.inputs.date }}" --dry="${{ github.event.inputs.dry }}"
